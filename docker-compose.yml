# Dedicated server: each start downloads server-arm64 for SERVER_COMMIT_SHA or GITHUB_SHA (must match the push you care about). Ignores older green runs on main. ARTIFACT_MAX_AGE_SEC (default 600) skips stale artifacts while waiting for the new workflow.
# Requires: arm64 host (or QEMU) matching the exported binary.
#
# Create a classic PAT: https://github.com/settings/tokens — scope "repo" (private repos) or
# fine-grained: Actions read + Contents read on this repository.
#
# Usage:
#   export GITHUB_REPOSITORY=youruser/tailwind
#   export GITHUB_TOKEN=ghp_...
#   export GITHUB_SHA=$(git rev-parse HEAD)   # or SERVER_COMMIT_SHA — must match the commit you expect CI to build
#   docker compose up -d
#
# Optional: ARTIFACT_MAX_AGE_SEC=0 when deploying an older commit; raise if CI usually takes >10m before the artifact exists.

name: tailwind

services:
  tailwind-server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "4242:4242/tcp"
    environment:
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_SHA: ${GITHUB_SHA:-}
      SERVER_COMMIT_SHA: ${SERVER_COMMIT_SHA:-}
      ARTIFACT_MAX_AGE_SEC: ${ARTIFACT_MAX_AGE_SEC:-600}
      INITIAL_WAIT_SECONDS: ${INITIAL_WAIT_SECONDS:-30}
      INSTALL_MAX_ATTEMPTS: ${INSTALL_MAX_ATTEMPTS:-120}
    volumes:
      - server_data:/opt/server

volumes:
  server_data:
