# Dedicated server: each start downloads the newest successful `godot-ci.yml` artifact from `main`,
# then installs it. ARTIFACT_MAX_AGE_SEC (default 600) skips stale artifacts while the new workflow is racing.
# Requires: arm64 host (or QEMU) matching the exported binary.
#
# Create a classic PAT: https://github.com/settings/tokens — scope "repo" (private repos) or
# fine-grained: Actions read + Contents read on this repository.
#
# Usage (local):
#   export GITHUB_REPOSITORY=youruser/tailwind
#   export GITHUB_TOKEN=ghp_...
#   docker compose up -d
#
# Optional: ARTIFACT_MAX_AGE_SEC=0 disables the staleness filter (useful for deploying older artifacts on purpose).

name: tailwind

services:
  tailwind-server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "4242:4242/tcp"
    environment:
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY:?Set GITHUB_REPOSITORY}
      - GITHUB_TOKEN=${GITHUB_TOKEN:?Set GITHUB_TOKEN}
      - ARTIFACT_MAX_AGE_SEC=${ARTIFACT_MAX_AGE_SEC:-600}
      - INITIAL_WAIT_SECONDS=${INITIAL_WAIT_SECONDS:-30}
      - INSTALL_MAX_ATTEMPTS=${INSTALL_MAX_ATTEMPTS:-120}
    volumes:
      - server_data:/opt/server

volumes:
  server_data:
