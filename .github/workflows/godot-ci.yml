# Web export → GitHub Pages; Linux dedicated server (preset "Linux Server", arm64 / Raspberry Pi 64-bit) → workflow artifact.
# Pages: Settings → Pages → Source: GitHub Actions (not a branch).
# Pin GODOT_VERSION and the container image tag to the same Godot release.

name: godot-ci export

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.6.1
  PROJECT_PATH: .

permissions:
  contents: read

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Web Build
        run: |
          mkdir -v -p build/web
          EXPORT_DIR="$(readlink -f build)"
          cd "$PROJECT_PATH"
          godot --headless --verbose --export-release "Web" "$EXPORT_DIR/web/index.html"

      - name: Stamp commit into exported index.html
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          COMMIT_DATE_ISO="$(git -C "$GITHUB_WORKSPACE" log -1 --format=%cI)"
          export COMMIT_DATE_ISO
          node << 'NODE'
          const fs = require("fs");
          const path = require("path");
          const file = path.join(process.env.GITHUB_WORKSPACE, "build", "web", "index.html");
          let text = fs.readFileSync(file, "utf8");
          text = text.split("$COMMIT_SHA").join(process.env.COMMIT_SHA);
          text = text.split("$COMMIT_DATE").join(process.env.COMMIT_DATE_ISO);
          fs.writeFileSync(file, text);
          NODE

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  export-linux-server:
    name: Linux Server Export (arm64)
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Linux dedicated server build
        run: |
          mkdir -v -p build
          EXPORT_DIR="$(readlink -f build)"
          cd "$PROJECT_PATH"
          godot --headless --verbose --export-release "Linux Server" "$EXPORT_DIR/server-arm64.zip"

      - name: Upload Linux server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-arm64
          path: build/server-arm64.zip

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    needs: export-web
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
